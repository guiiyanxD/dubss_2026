{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Digitalizar Documento{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h2 class="mb-1">Digitalizar Documento</h2>
        <p class="text-muted mb-4">
            Postulación #{{ documento.postulacion.pk }} —
            <strong>{{ documento.tipo_documento.nombre }}</strong>
        </p>
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 justify-content-end mt-3">
                        <a href="{% url 'postulaciones:revision' pk=documento.postulacion.pk %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Subir archivo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
