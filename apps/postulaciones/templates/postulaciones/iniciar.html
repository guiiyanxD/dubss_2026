{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Iniciar Postulación — {{ convocatoria.nombre }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h2 class="mb-1">Postularse a una Beca</h2>
        <p class="text-muted mb-4">Convocatoria: <strong>{{ convocatoria.nombre }}</strong></p>

        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 justify-content-end mt-3">
                        <a href="{% url 'convocatorias:detalle' pk=convocatoria.pk %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Iniciar postulación</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
