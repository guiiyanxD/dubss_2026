{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-4">{{ titulo }}</h2>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Guardar</button>
                        {% if convocatoria %}
                        <a href="{% url 'convocatorias:detalle' convocatoria.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                        {% else %}
                        <a href="{% url 'convocatorias:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
                        {% endif %}
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
