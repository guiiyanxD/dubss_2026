{% extends "base.html" %}

{% block title %}{{ conversacion.titulo|default:"Chat IA" }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">{{ conversacion.titulo|default:"Nueva conversación" }}</h2>
    <a href="{% url 'reportes:chat_lista' %}" class="btn btn-secondary">← Mis conversaciones</a>
</div>

<div class="card shadow-sm">
    <div class="card-body" style="min-height: 50vh;">
        {% include "reportes/_chat_mensajes.html" %}
    </div>
    <div class="card-footer">
        <form hx-post="{% url 'reportes:chat_detalle' conversacion.pk %}"
              hx-target="#chat-mensajes"
              hx-swap="outerHTML"
              hx-on:htmx:after-request="this.reset()"
              class="d-flex gap-2">
            {% csrf_token %}
            <input type="text" name="contenido" class="form-control"
                   placeholder="Preguntá algo sobre los datos del sistema..."
                   autocomplete="off" required>
            <button type="submit" class="btn btn-primary"><i class="bi bi-send-fill"></i></button>
        </form>
    </div>
</div>
{% endblock %}
