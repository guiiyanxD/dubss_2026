{% extends "base.html" %}

{% block title %}Inicio{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center py-5">
        <h1 class="display-5 fw-bold">Sistema de Gestión de Becas</h1>
        <p class="lead text-muted mt-3">Plataforma de gestión de convocatorias y postulaciones de becas universitarias.</p>
        {% if not user.is_authenticated %}
        <a href="{% url 'account_login' %}" class="btn btn-primary btn-lg mt-3">Iniciar sesión</a>
        {% endif %}
    </div>
</div>
{% endblock %}
