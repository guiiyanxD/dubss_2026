{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Registro de Estudiante{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-4">Registro de Estudiante</h2>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-primary btn-lg">Registrarme</button>
                    </div>
                </form>
                <p class="text-center text-muted mt-3 mb-0">
                    ¿Ya tenés cuenta? <a href="{% url 'account_login' %}">Iniciar sesión</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
