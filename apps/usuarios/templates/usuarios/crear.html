{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Nuevo Usuario{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-1">Crear Usuario Interno</h2>
                <p class="text-muted mb-4">Se enviará un email al usuario para que establezca su contraseña.</p>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">Crear y enviar email</button>
                        <a href="{% url 'usuarios:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
