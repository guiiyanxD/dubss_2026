services:
  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ficct.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
      PGADMIN_SERVER_JSON_FILE: /tmp/servers.json
    env_file:
      - .env
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/setup.sh:/pgadmin/setup.sh:ro
    entrypoint: /bin/sh /pgadmin/setup.sh
    depends_on:
      db:
        condition: service_healthy
  # Servicio que corre migraciones una sola vez al iniciar el stack.
  # web, worker y beat dependen de que este servicio termine exitosamente.
  init:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python manage.py migrate --noinput
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully

  # Servidor Ollama local (LLM). En dev corre solo CPU con un modelo chico,
  # únicamente para poder probar el flujo de IA sin depender de la PC de mesa.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Descarga el modelo una sola vez al iniciar el stack (igual patrón que `init`).
  ollama-init:
    image: ollama/ollama:latest
    entrypoint: ["sh", "-c"]
    command: ["ollama pull qwen2.5:3b"]
    environment:
      OLLAMA_HOST: ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config.celery worker -Q celery,ia -l info
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully

  sonarqube:
    image: sonarqube:community
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    profiles:
      - quality
    volumes:
      - .:/usr/src
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    depends_on:
      - sonarqube

volumes:
  postgres_data:
  media_data:
  pgadmin_data:
  ollama_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
